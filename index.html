<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🚗车队抽签</title>
<style>
body{margin:0;padding:20px;background:linear-gradient(135deg,#89f7fe,#66a6ff);font-family:"Microsoft YaHei";text-align:center}
.card{max-width:430px;margin:auto;background:#fff;border-radius:25px;padding:25px;box-shadow:0 8px 25px #888}
h1{font-size:30px}
#show{height:70px;line-height:70px;font-size:38px;font-weight:bold;color:#ff6b6b}
button{margin:8px;border:0;border-radius:30px;padding:14px 25px;font-size:18px;color:white;background:#ff6b6b}
.share{background:#4caf50}
.box{margin-top:20px;padding:15px;border-radius:18px;background:#f5f8ff;font-size:20px}
.title{font-size:24px;font-weight:bold}
.fire{position:fixed;font-size:35px;animation:fall 1.5s linear forwards}
@keyframes fall{from{transform:translateY(-50px)}to{transform:translateY(700px);opacity:0}}
.small{color:#777}
</style>
</head>
<body>
<div class="card">
<h1>🚗 车队随机抽签</h1>
<p class="small">一次抽一人，看看谁加入哪个车队</p>

<div id="show">准备开始</div>

<button onclick="draw()">🎲 抽下一位</button>
<button class="share" onclick="share()">🔗 分享</button>

<div id="count"></div>
<div id="result"></div>
</div>

<script>
let names=["李子","橙子","蜜蜂","弦康","栀子","沐沐","潮生"];
let shuffled=[...names].sort(()=>Math.random()-0.5);
let drawn=[];
let number=0;

function draw(){
 if(number>=7){
  document.getElementById("show").innerHTML="🎉 全部完成";
  return;
 }
 let show=document.getElementById("show");
 let t=0;
 let timer=setInterval(()=>{
  show.innerHTML=names[Math.floor(Math.random()*names.length)];
  t++;
  if(t>18){
   clearInterval(timer);
   let person=shuffled[number];
   drawn.push(person);
   number++;
   show.innerHTML="🎉 "+person;
   fireworks();
   document.getElementById("count").innerHTML=
   "👥 "+person+" 已抽第 "+number+" 位";
   render();
  }
 },80);
}

function render(){
 let a=drawn.slice(0,4);
 let b=drawn.slice(4,7);
 document.getElementById("result").innerHTML=
 (a.length?`<div class="box"><div class="title">🚗 四人车队</div>${a.join("<br>")}</div>`:"")+
 (b.length?`<div class="box"><div class="title">🚙 三人车队</div>${b.join("<br>")}</div>`:"");
}

function fireworks(){
 for(let i=0;i<18;i++){
  let e=document.createElement("div");
  e.className="fire";
  e.innerHTML=["🎉","✨","🎊","⭐"][Math.floor(Math.random()*4)];
  e.style.left=Math.random()*100+"%";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1500);
 }
}

function share(){
 if(navigator.share){
  navigator.share({title:"车队抽签",text:"来抽你的车队！"});
 }else{
  alert("请复制网页链接发送到微信群");
 }
}
</script>
</body>
</html>
